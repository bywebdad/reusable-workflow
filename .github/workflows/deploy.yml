name: Deploy Application

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
        description: 'Docker image tag to deploy'
      deploy_method:
        required: true
        type: string
        description: 'Deploy method: dokploy, devtron or vds'
      devtron_webhook_url:
        required: false
        type: string
        description: 'Devtron webhook URL (for devtron method)'
      dokploy_webhook_url:
        required: false
        type: string
        description: 'Dokploy webhook URL (for dokploy method)'
      docker_compose_file:
        required: false
        type: string
        description: 'Path to docker-compose file for VDS deployment'
      vds_deploy_path:
        required: false
        type: string
        description: 'Remote path on VDS server'
      environment:
        required: true
        type: string
        description: 'Environment from build job'
      user_name:
        required: false
        type: string
        default: 'root'
        description: 'SSH server username'
      env_file_path:
        required: false
        type: string
        default: ''
        description: 'env file path'
      organization:
        required: false
        type: string
        description: 'GitHub organization name'
    secrets:
      DEVTRON_WEBHOOK_TOKEN:
        required: false
        description: 'Devtron webhook token'
      SSH_HOST:
        required: false
        description: 'SSH host for VDS deployment'
      SSH_PORT:
        required: false
        description: 'SSH port for VDS deployment'
      SSH_PRIVATE_KEY:
        required: false
        description: 'SSH private key for VDS deployment'
      GHCR_TOKEN:
        required: false
        description: 'GitHub Container Registry token'

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    steps:
      - name: Checkout code
        if: inputs.deploy_method == 'vds' || inputs.deploy_method == 'old-vds'
        uses: actions/checkout@v3

      - name: Call Devtron Webhook for deploy
        if: inputs.deploy_method == 'devtron'
        run: |
          curl --location --request POST \
          "${{ inputs.devtron_webhook_url }}" \
            --header 'Content-Type: application/json' \
            --header 'api-token: ${{ secrets.DEVTRON_WEBHOOK_TOKEN }}' \
            --data-raw "{\"dockerImage\":\"${{ inputs.image_tag }}\"}"

      - name: Call Dokploy Webhook for deploy
        if: inputs.deploy_method == 'dokploy'
        run: |
          curl -X POST -H "Content-Type: application/json" \
          ${{ inputs.dokploy_webhook_url }}

      - name: Remove old code on VDS
        if: inputs.deploy_method == 'vds' || inputs.deploy_method == 'old-vds'
        uses: garygrossgarten/github-action-ssh@release
        with:
          command: |
            rm -rf ${{ inputs.vds_deploy_path }}
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ inputs.user_name }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Send docker-compose file to VDS
        if: inputs.deploy_method == 'vds' || inputs.deploy_method == 'old-vds'
        uses: garygrossgarten/github-action-scp@release
        with:
          local: ./${{ inputs.docker_compose_file }}
          remote: ${{ inputs.vds_deploy_path }}/docker-compose.${{ inputs.environment }}.yml
          host: ${{ secrets.SSH_HOST }}
          username: ${{ inputs.user_name }}
          port: ${{ secrets.SSH_PORT }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Send .env file to VDS
        if: (inputs.deploy_method == 'vds' || inputs.deploy_method == 'old-vds') && inputs.env_file_path != ''
        uses: garygrossgarten/github-action-scp@release
        with:
          local: ./${{ inputs.env_file_path }}
          remote: ${{ inputs.vds_deploy_path }}/.env
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ inputs.user_name }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Login to GHCR on VDS
        if: inputs.deploy_method == 'vds' || inputs.deploy_method == 'old-vds'
        uses: garygrossgarten/github-action-ssh@release
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ inputs.user_name }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}
          command: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ inputs.organization }} --password-stdin

      - name: Deploy on VDS server
        if: inputs.deploy_method == 'vds'
        uses: garygrossgarten/github-action-ssh@release
        with:
          command: |
            cd ${{ inputs.vds_deploy_path }}
            docker pull ${{ inputs.image_tag }}
            docker compose -f docker-compose.${{ inputs.environment }}.yml up --build -d
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ inputs.user_name }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on old docker VDS server
        if: inputs.deploy_method == 'old-vds'
        uses: garygrossgarten/github-action-ssh@release
        with:
          command: |
            cd ${{ inputs.vds_deploy_path }}
            docker pull ${{ inputs.image_tag }}
            docker-compose -f docker-compose.${{ inputs.environment }}.yml up --build -d
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ inputs.user_name }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Mark deployment in GitHub
        if: contains(fromJSON('["stage","release","prod"]'), inputs.environment)
        env:
          GH_TOKEN: ${{ github.token }}
          ENVN: ${{ inputs.environment }}
        run: |
          ENV=$([ "$ENVN" = "stage" ] && echo stage || echo production)
          PROD=$([ "$ENV" = "production" ] && echo true || echo false)
          ID=$(gh api -X POST "repos/$GITHUB_REPOSITORY/deployments" --input - --jq '.id' <<JSON
          { "ref": "$GITHUB_SHA", "environment": "$ENV",
            "description": "CI deploy ($GITHUB_RUN_ID)",
            "auto_merge": false, "required_contexts": [],
            "production_environment": $PROD, "transient_environment": false }
          JSON
          )
          gh api -X POST "repos/$GITHUB_REPOSITORY/deployments/$ID/statuses" \
            -f state=success -f environment="$ENV" -f description="Deployed"
